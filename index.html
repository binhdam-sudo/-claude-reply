<!DOCTYPE index.html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Claude Ngoại Giao</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@300;400;500&display=swap');

  :root {
    --navy: #0a1628;
    --navy-mid: #132240;
    --navy-light: #1e3a5f;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f5f0e8;
    --text: #e8e4dc;
    --text-muted: #8a9ab5;
    --border: rgba(201,168,76,0.25);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }

  .emblem {
    width: 36px;
    height: 36px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.02em;
    line-height: 1.2;
  }

  .header p {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-left: 48px;
  }

  /* API key section */
  .key-section {
    margin: 16px;
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .key-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .key-label::before {
    content: '🔑';
    font-size: 12px;
  }

  .key-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .key-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: monospace;
    font-size: 11px;
    outline: none;
    transition: border-color 0.2s;
  }

  .key-input:focus { border-color: var(--gold); }
  .key-input::placeholder { color: var(--text-muted); }

  .key-save-btn {
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }

  .key-save-btn:hover { background: var(--gold-light); }

  .key-status {
    font-size: 11px;
    margin-top: 6px;
    color: var(--text-muted);
  }

  .key-status.ok { color: #5cb85c; }

  /* Context selector */
  .context-section {
    margin: 0 16px 16px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .context-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .chip {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .chip.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* Main input */
  .input-section {
    margin: 0 16px 16px;
  }

  .msg-textarea {
    width: 100%;
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 300;
    line-height: 1.6;
    resize: none;
    outline: none;
    min-height: 120px;
    transition: border-color 0.2s;
  }

  .msg-textarea:focus { border-color: var(--gold); }
  .msg-textarea::placeholder { color: var(--text-muted); }

  /* Tone selector */
  .tone-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .tone-btn {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .tone-btn .icon { font-size: 16px; display: block; margin-bottom: 2px; }

  .tone-btn.active {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* Generate button */
  .gen-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold) 0%, #a8722a 100%);
    color: var(--navy);
    border: none;
    border-radius: var(--radius);
    padding: 14px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.03em;
    margin: 0 16px 20px;
    width: calc(100% - 32px);
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .gen-btn:active { transform: scale(0.98); opacity: 0.9; }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Loading */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(10,22,40,0.3);
    border-top-color: var(--navy);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results {
    margin: 0 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .result-card {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card:nth-child(2) { animation-delay: 0.1s; }
  .result-card:nth-child(3) { animation-delay: 0.2s; }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: rgba(201,168,76,0.08);
    border-bottom: 1px solid var(--border);
  }

  .card-tag {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }

  .copy-btn {
    background: rgba(201,168,76,0.15);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    color: var(--gold-light);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:active, .copy-btn.copied {
    background: rgba(92,184,92,0.2);
    border-color: #5cb85c;
    color: #5cb85c;
  }

  .card-body {
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--text);
  }

  /* Error */
  .error-msg {
    margin: 0 16px 16px;
    background: rgba(220,53,69,0.1);
    border: 1px solid rgba(220,53,69,0.3);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: #f5a0a8;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 16px 16px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="emblem">🇻🇳</div>
    <h1>Trợ lý Ngoại giao</h1>
  </div>
  <p>ĐSQ Việt Nam tại Timor-Leste &nbsp;·&nbsp; Powered by Claude</p>
</div>

<!-- API Key -->
<div class="key-section">
  <div class="key-label">API Key</div>
  <div class="key-row">
    <input class="key-input" type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" />
    <button class="key-save-btn" onclick="saveKey()">Lưu</button>
  </div>
  <div class="key-status" id="keyStatus">Chưa có key</div>
</div>

<!-- Context -->
<div class="context-section">
  <div class="section-label">Đối tượng</div>
  <div class="context-chips">
    <div class="chip active" onclick="selectChip(this, 'context')" data-val="quan_chuc">🏛️ Quan chức sở tại</div>
    <div class="chip" onclick="selectChip(this, 'context')" data-val="dong_nghiep">👤 Đồng nghiệp</div>
    <div class="chip" onclick="selectChip(this, 'context')" data-val="doi_tac">🤝 Đối tác</div>
    <div class="chip" onclick="selectChip(this, 'context')" data-val="lanh_dao">⭐ Lãnh đạo</div>
  </div>
</div>

<div class="divider"></div>

<!-- Input -->
<div class="input-section">
  <div class="section-label">Tin nhắn nhận được</div>
  <textarea class="msg-textarea" id="msgInput" placeholder="Paste tin nhắn vào đây...&#10;&#10;Ví dụ: 'Dear Ambassador, I would like to invite you to...'"></textarea>

  <div class="tone-row">
    <div class="tone-btn active" onclick="selectChip(this, 'tone')" data-val="trang_trong">
      <span class="icon">🎩</span>Trang trọng
    </div>
    <div class="tone-btn" onclick="selectChip(this, 'tone')" data-val="than_thien">
      <span class="icon">😊</span>Thân thiện
    </div>
    <div class="tone-btn" onclick="selectChip(this, 'tone')" data-val="ngan_gon">
      <span class="icon">⚡</span>Ngắn gọn
    </div>
  </div>
</div>

<button class="gen-btn" id="genBtn" onclick="generate()">
  ✨ Soạn câu trả lời
</button>

<div id="errorBox" class="error-msg" style="display:none"></div>
<div class="results" id="results"></div>

<script>
  let selectedContext = 'quan_chuc';
  let selectedTone = 'trang_trong';

  // Load saved key
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('claude_key');
    if (saved) {
      document.getElementById('apiKey').value = saved;
      document.getElementById('keyStatus').textContent = '✓ Key đã lưu';
      document.getElementById('keyStatus').className = 'key-status ok';
    }
  });

  function saveKey() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key.startsWith('sk-ant-')) {
      document.getElementById('keyStatus').textContent = '⚠ Key không hợp lệ';
      document.getElementById('keyStatus').className = 'key-status';
      return;
    }
    localStorage.setItem('claude_key', key);
    document.getElementById('keyStatus').textContent = '✓ Đã lưu thành công';
    document.getElementById('keyStatus').className = 'key-status ok';
  }

  function selectChip(el, group) {
    if (group === 'context') {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      selectedContext = el.dataset.val;
    } else {
      document.querySelectorAll('.tone-btn').forEach(c => c.classList.remove('active'));
      selectedTone = el.dataset.val;
    }
    el.classList.add('active');
  }

  const contextMap = {
    quan_chuc: 'quan chức chính phủ sở tại Timor-Leste',
    dong_nghiep: 'đồng nghiệp ngoại giao',
    doi_tac: 'đối tác tổ chức quốc tế',
    lanh_dao: 'lãnh đạo cấp cao'
  };

  const toneMap = {
    trang_trong: 'trang trọng, lịch sự, đúng nghi thức ngoại giao',
    than_thien: 'thân thiện, ấm áp nhưng vẫn chuyên nghiệp',
    ngan_gon: 'ngắn gọn, súc tích, đi thẳng vào vấn đề'
  };

  async function generate() {
    const key = localStorage.getItem('claude_key') || document.getElementById('apiKey').value.trim();
    const msg = document.getElementById('msgInput').value.trim();

    if (!key) { showError('Vui lòng nhập và lưu API key trước.'); return; }
    if (!msg) { showError('Vui lòng nhập tin nhắn cần trả lời.'); return; }

    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Đang soạn...';
    document.getElementById('errorBox').style.display = 'none';
    document.getElementById('results').innerHTML = '';

    const prompt = `Bạn là trợ lý ngoại giao chuyên nghiệp của Đại sứ quán Việt Nam tại Timor-Leste.

Hãy soạn 3 phương án trả lời cho tin nhắn sau đây. Người nhận tin là ${contextMap[selectedContext]}.

Phong cách yêu cầu: ${toneMap[selectedTone]}.

Tin nhắn cần trả lời:
"${msg}"

Yêu cầu:
- Phương án 1: Xác nhận tham dự / đồng ý
- Phương án 2: Từ chối lịch sự hoặc đề nghị thay đổi
- Phương án 3: Phương án linh hoạt / cần xác nhận thêm
- Mỗi phương án dài 2-4 câu, dùng ngôn ngữ phù hợp (tiếng Anh nếu tin gốc tiếng Anh, tiếng Việt nếu tin gốc tiếng Việt)
- Không giải thích, chỉ viết nội dung tin nhắn
- Tách các phương án bằng dòng "---"`;

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 800,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.error?.message || `Lỗi ${resp.status}`);
      }

      const data = await resp.json();
      const text = data.content[0].text;
      const parts = text.split(/\n?---\n?/).filter(p => p.trim());

      const labels = ['Đồng ý / Xác nhận', 'Từ chối lịch sự', 'Linh hoạt / Cần xác nhận'];
      const results = document.getElementById('results');

      parts.forEach((part, i) => {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
          <div class="card-header">
            <span class="card-tag">${labels[i] || 'Phương án ' + (i+1)}</span>
            <button class="copy-btn" onclick="copyText(this, ${JSON.stringify(part.trim())})">Copy</button>
          </div>
          <div class="card-body">${part.trim()}</div>
        `;
        results.appendChild(card);
      });

    } catch (e) {
      showError('Lỗi: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '✨ Soạn câu trả lời';
    }
  }

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ Đã copy';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.style.display = 'block';
  }
</script>
</body>
</html>
